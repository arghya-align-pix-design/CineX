version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: cinex-postgres
    environment:
      POSTGRES_DB: cinexdb
      POSTGRES_USER: cinex
      POSTGRES_PASSWORD: cinex123
      TZ: UTC
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: cinex-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cinex.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata: