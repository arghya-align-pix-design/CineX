# Invitation App / Setup config
cinex.mail.from=noreply-test@cinex.com
cinex.mail.sender-name=CineX Test
cinex.app.portal-url=http://localhost:5173/login
cinex.jwt.secret=cinex-super-secret-key-must-be-32-chars!!
