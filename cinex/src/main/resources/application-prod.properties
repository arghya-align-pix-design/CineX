# Production Profile Configurations (strictly environment driven)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/cinexdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:cinex}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:cinex123}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis configuration
spring.data.redis.host=${SPRING_REDIS_HOST:redis}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}

# Mail Configuration
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Invitation App / Setup config
cinex.mail.from=${CINEX_MAIL_FROM:noreply@cinex.com}
cinex.mail.sender-name=${CINEX_MAIL_SENDER_NAME:CineX}
cinex.app.portal-url=${CINEX_APP_PORTAL_URL:http://localhost:5173/login}
cinex.jwt.secret=${CINEX_JWT_SECRET}
